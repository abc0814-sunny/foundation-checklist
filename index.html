<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游源日慈善協會 籌設進度</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    background: #fafaf7; color: #1a2744;
    line-height: 1.6; padding: 2rem 1rem;
    max-width: 780px; margin: 0 auto;
  }
  header { margin-bottom: 2rem; padding-bottom: 1.2rem; border-bottom: 2px solid #1a2744; }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; }
  header p { font-size: 0.85rem; color: #5a6577; }
  .sync-status {
    display: inline-block; font-size: 0.75rem; padding: 0.2rem 0.5rem;
    border-radius: 3px; margin-top: 0.4rem;
  }
  .sync-ok { background: #e8f4f0; color: #2d7d6f; }
  .sync-saving { background: #fef6e8; color: #c4820e; }
  .sync-error { background: #fde8e8; color: #c0392b; }
  .sync-loading { background: #e8eef6; color: #3b5998; }
  .progress-bar { margin-top: 0.8rem; background: #e8e6e0; border-radius: 4px; height: 8px; }
  .progress-fill { height: 100%; background: #2d7d6f; border-radius: 4px; transition: width 0.4s; }
  .progress-label { font-size: 0.78rem; color: #5a6577; margin-top: 0.3rem; }
  .phase { margin-bottom: 1.2rem; }
  .phase-header {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 0; cursor: pointer; user-select: none;
    border-bottom: 1px solid #d4d1ca;
  }
  .phase-header:hover { opacity: 0.8; }
  .phase-number {
    display: inline-flex; align-items: center; justify-content: center;
    width: 1.6rem; height: 1.6rem; border-radius: 50%;
    font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
  }
  .phase-number.done { background: #2d7d6f; color: #fff; }
  .phase-number.current { background: #c4820e; color: #fff; }
  .phase-number.future { background: #e8e6e0; color: #5a6577; }
  .phase-title { font-size: 1rem; font-weight: 600; flex: 1; }
  .phase-toggle { font-size: 0.7rem; color: #5a6577; transition: transform 0.2s; }
  .phase.collapsed .phase-toggle { transform: rotate(-90deg); }
  .phase.collapsed .phase-body { display: none; }
  .phase-body { padding: 0.4rem 0 0.4rem 2.1rem; }
  .task {
    display: flex; align-items: flex-start; gap: 0.5rem;
    padding: 0.5rem; border-radius: 4px; transition: background 0.15s;
  }
  .task:hover { background: #f0eee8; }
  .task input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 18px; height: 18px; border: 2px solid #d4d1ca;
    border-radius: 3px; flex-shrink: 0; margin-top: 3px;
    cursor: pointer; position: relative; transition: all 0.15s;
  }
  .task input:checked { background: #2d7d6f; border-color: #2d7d6f; }
  .task input:checked::after {
    content: ''; position: absolute; left: 4px; top: 1px;
    width: 6px; height: 10px; border: solid #fff;
    border-width: 0 2px 2px 0; transform: rotate(45deg);
  }
  .task-label { font-size: 0.9rem; cursor: pointer; }
  .task.checked .task-label { color: #5a6577; text-decoration: line-through; text-decoration-color: #d4d1ca; }
  .task-detail { font-size: 0.76rem; color: #5a6577; margin-top: 0.1rem; }
  .note {
    margin: 1.5rem 0; padding: 0.7rem 1rem;
    background: #fef6e8; border-left: 3px solid #c4820e;
    border-radius: 0 4px 4px 0; font-size: 0.8rem; color: #6b5100;
  }
  .files-section {
    margin: 1.5rem 0; padding: 1rem;
    background: #f0eee8; border-radius: 6px;
  }
  .files-section h3 {
    font-size: 0.95rem; margin-bottom: 0.6rem; font-weight: 600;
  }
  .file-link {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 0.7rem; margin-bottom: 0.4rem;
    background: #fff; border-radius: 4px;
    text-decoration: none; color: #1a2744;
    font-size: 0.85rem; transition: background 0.15s;
  }
  .file-link:hover { background: #e8e6e0; }
  .file-icon { font-size: 1.1rem; }
  .file-size { color: #5a6577; font-size: 0.75rem; margin-left: auto; }
  .task-file {
    display: inline-flex; align-items: center; gap: 0.3rem;
    font-size: 0.72rem; color: #3b5998; text-decoration: none;
    padding: 0.15rem 0.4rem; margin-top: 0.2rem;
    background: #e8eef6; border-radius: 3px;
  }
  .task-file:hover { background: #d0ddef; }
  footer { margin-top: 2rem; padding-top: 0.8rem; border-top: 1px solid #d4d1ca; font-size: 0.72rem; color: #5a6577; }
</style>
</head>
<body>

<header>
  <h1>社團法人游源日慈善社福協會</h1>
  <p>籌設工作進度清單 — 依桃園市社會團體籌設須知</p>
  <div class="sync-status sync-loading" id="syncStatus">載入中...</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</header>

<div id="app"></div>

<div class="note">
  <strong>時限提醒：</strong>取得許可籌設公文後 <strong>6 個月內</strong>須完成籌備並成立，否則許可廢止。成立大會紀錄應於會後 <strong>30 日內</strong>函報主管機關。
</div>

<footer>資料來源：桃園市人民團體籌設須知 1140515 版 ・ 進度即時同步（所有人共用）</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxuYCh-PpUGZ7F2Z3Pw6Ar6LSjrl7DdDT-GY_ImrFouykq8gwZ90-DPcCcTk509ATnz/exec';

const PHASES = [
  { title: '申請籌設', tasks: [
    { id: 'a1', label: '召集 30 位以上發起人', detail: '須設籍或工作於桃園市、年滿 18 歲' },
    { id: 'a2', label: '收集全體發起人身分證正反面影本', detail: '未設籍桃園市者另附工作證明' },
    { id: 'a3', label: '製作發起人名冊（附件二格式）', detail: '含身分證影本、聯絡電話、親自簽名/蓋章', file: { name: '發起人名冊(PDF)', url: 'files/社團法人游源日慈善社福協會_發起人名冊_v17.pdf', name2: '發起人名冊(Word)', url2: 'files/社團法人游源日慈善社福協會_發起人名冊_v17.docx' } },
    { id: 'a4', label: '擬定章程草案', detail: '', file: { name: '組織章程', url: 'files/社團法人游源日慈善社福協會組織章程.docx' } },
    { id: 'a5', label: '填寫申請書（附件一）', detail: '受文者：桃園市政府', file: { name: '申請書', url: 'files/游源日慈善協會_申請書.docx' } },
    { id: 'a6', label: '備齊文件送桃園市政府社會局', detail: '正本＋影本各 1 份' },
    { id: 'a7', label: '取得主管機關許可籌設公文', detail: '收到公文後開始計算 6 個月期限' },
  ]},
  { title: '發起人會議', tasks: [
    { id: 'b1', label: '發起人代表召開發起人會議', detail: '' },
    { id: 'b2', label: '推選主席（由發起人互推）', detail: '' },
    { id: 'b3', label: '推選籌備會委員', detail: '至少 3 人以上，定額且奇數' },
    { id: 'b4', label: '推選籌備會主任委員', detail: '由籌備委員互推 1 人' },
    { id: 'b5', label: '製作發起人會議紀錄', detail: '' },
  ]},
  { title: '籌備會議（可開多次）', tasks: [
    { id: 'c1', label: '審查章程草案', detail: '提成立大會審議' },
    { id: 'c2', label: '決定入會申請手續及申請書格式', detail: '' },
    { id: 'c3', label: '公開徵求會員', detail: '' },
    { id: 'c4', label: '審定會員資格並造具會員名冊', detail: '' },
    { id: 'c5', label: '擬定年度工作計畫', detail: '' },
    { id: 'c6', label: '擬定年度經費收支預算表', detail: '' },
    { id: 'c7', label: '決定成立大會召開日期及地點', detail: '' },
    { id: 'c8', label: '籌備理監事選舉事宜', detail: '決定選票格式' },
    { id: 'c9', label: '製作籌備會議紀錄', detail: '' },
    { id: 'c10', label: '其他籌備工作事項', detail: '' },
  ]},
  { title: '成立大會', tasks: [
    { id: 'd1', label: '15 日前發開會通知', detail: '通知各會員及主管機關' },
    { id: 'd2', label: '召開成立大會', detail: '' },
    { id: 'd3', label: '審議通過章程', detail: '' },
    { id: 'd4', label: '審議通過年度工作計畫及收支預算表', detail: '' },
    { id: 'd5', label: '選舉第 1 屆理事及監事', detail: '' },
    { id: 'd6', label: '製作成立大會紀錄', detail: '' },
  ]},
  { title: '第 1 屆理事會、監事會', tasks: [
    { id: 'e1', label: '成立大會後 15 日內召開', detail: '可於成立大會當日舉行' },
    { id: 'e2', label: '理事互選常務理事', detail: '' },
    { id: 'e3', label: '常務理事互選理事長', detail: '' },
    { id: 'e4', label: '監事互選常務監事', detail: '' },
    { id: 'e5', label: '製作理事會、監事會會議紀錄', detail: '' },
  ]},
  { title: '函報立案', tasks: [
    { id: 'f1', label: '會後 30 日內檢具文件函報主管機關', detail: '' },
    { id: 'f2', label: '附成立大會、理事會、監事會會議紀錄', detail: '' },
    { id: 'f3', label: '附理監事簡歷冊（共 3 份）', detail: '' },
    { id: 'f4', label: '附章程（共 3 份）', detail: '' },
    { id: 'f5', label: '附年度工作計畫', detail: '' },
    { id: 'f6', label: '附年度經費收支預算表', detail: '' },
    { id: 'f7', label: '附會址使用同意書', detail: '' },
    { id: 'f8', label: '附移交清冊', detail: '' },
    { id: 'f9', label: '附成立大會手冊', detail: '' },
    { id: 'f10', label: '取得主管機關核准立案及立案證書', detail: '' },
  ]},
  { title: '法人登記（選辦）', tasks: [
    { id: 'g1', label: '決定是否辦理社團法人登記', detail: '' },
    { id: 'g2', label: '向法院申請社團法人登記', detail: '' },
  ]},
];

let state = {};
let saveTimer = null;

function setSync(cls, text) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + cls;
  el.textContent = text;
}

async function loadState() {
  setSync('sync-loading', '載入中...');
  try {
    const r = await fetch(API_URL);
    state = await r.json();
    setSync('sync-ok', '已同步 ✓');
    render();
  } catch (e) {
    setSync('sync-error', '載入失敗，使用本機資料');
    try { state = JSON.parse(localStorage.getItem('foundation_shared') || '{}'); } catch { state = {}; }
    render();
  }
}

function saveState() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setSync('sync-saving', '儲存中...');
    localStorage.setItem('foundation_shared', JSON.stringify(state));
    try {
      await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(state),
      });
      setTimeout(() => setSync('sync-ok', '已同步 ✓'), 800);
    } catch (e) {
      setSync('sync-error', '同步失敗（已存本機）');
    }
  }, 500);
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  let total = 0, done = 0;

  PHASES.forEach((phase, pi) => {
    const div = document.createElement('div');
    div.className = 'phase';
    if (state['_collapse_' + pi]) div.classList.add('collapsed');

    const pDone = phase.tasks.every(t => state[t.id]);
    const pAny = phase.tasks.some(t => state[t.id]);
    const sc = pDone ? 'done' : pAny ? 'current' : 'future';
    total += phase.tasks.length;
    done += phase.tasks.filter(t => state[t.id]).length;

    div.innerHTML = `
      <div class="phase-header" data-p="${pi}">
        <span class="phase-number ${sc}">${pDone ? '✓' : pi + 1}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-toggle">▼</span>
      </div>
      <div class="phase-body">
        ${phase.tasks.map(t => `
          <div class="task ${state[t.id] ? 'checked' : ''}">
            <input type="checkbox" id="${t.id}" ${state[t.id] ? 'checked' : ''}>
            <div>
              <label class="task-label" for="${t.id}">${t.label}</label>
              ${t.detail ? `<div class="task-detail">${t.detail}</div>` : ''}
              ${t.file ? `<a class="task-file" href="${t.file.url}" download onclick="event.stopPropagation()">📄 ${t.file.name}</a>` : ''}
              ${t.file && t.file.url2 ? `<a class="task-file" href="${t.file.url2}" download onclick="event.stopPropagation()">📝 ${t.file.name2}</a>` : ''}
            </div>
          </div>
        `).join('')}
      </div>`;
    app.appendChild(div);
  });

  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total} 項完成（${pct}%）`;

  app.querySelectorAll('.phase-header').forEach(h => {
    h.addEventListener('click', () => {
      state['_collapse_' + h.dataset.p] = !state['_collapse_' + h.dataset.p];
      saveState(); render();
    });
  });
  app.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      state[cb.id] = cb.checked;
      saveState(); render();
    });
  });
}

loadState();
</script>
</body>
</html>
